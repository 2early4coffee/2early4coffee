<svg width="840" height="160" viewBox="0 0 840 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b61ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="160" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="20" x2="840" y2="20"/>
    <line x1="0" y1="40" x2="840" y2="40"/>
    <line x1="0" y1="60" x2="840" y2="60"/>
    <line x1="0" y1="80" x2="840" y2="80"/>
    <line x1="0" y1="100" x2="840" y2="100"/>
    <line x1="0" y1="120" x2="840" y2="120"/>
    <line x1="0" y1="140" x2="840" y2="140"/>
    <line x1="70" y1="0" x2="70" y2="160"/>
    <line x1="140" y1="0" x2="140" y2="160"/>
    <line x1="210" y1="0" x2="210" y2="160"/>
    <line x1="280" y1="0" x2="280" y2="160"/>
    <line x1="350" y1="0" x2="350" y2="160"/>
    <line x1="420" y1="0" x2="420" y2="160"/>
    <line x1="490" y1="0" x2="490" y2="160"/>
    <line x1="560" y1="0" x2="560" y2="160"/>
    <line x1="630" y1="0" x2="630" y2="160"/>
    <line x1="700" y1="0" x2="700" y2="160"/>
    <line x1="770" y1="0" x2="770" y2="160"/>
  </g>

  <!-- Animated scan line -->
  <rect x="0" width="840" height="2" fill="url(#accent)" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,158;0,0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Left bracket accent -->
  <text x="28" y="95" font-family="monospace" font-size="72" fill="#00d4ff" opacity="0.15" filter="url(#glow2)">{</text>

  <!-- Right bracket accent -->
  <text x="790" y="95" font-family="monospace" font-size="72" fill="#7b61ff" opacity="0.15" filter="url(#glow2)">}</text>

  <!-- Blinking cursor dot top left -->
  <circle cx="20" cy="20" r="3" fill="#00d4ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner accents -->
  <polyline points="52,8 8,8 8,52" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <polyline points="788,8 832,8 832,52" fill="none" stroke="#7b61ff" stroke-width="1.5" opacity="0.5"/>
  <polyline points="52,152 8,152 8,108" fill="none" stroke="#7b61ff" stroke-width="1.5" opacity="0.5"/>
  <polyline points="788,152 832,152 832,108" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Main name -->
  <text x="420" y="72" font-family="'Courier New', monospace" font-size="38" font-weight="bold" fill="url(#accent)" text-anchor="middle" filter="url(#glow)">ROY WALTER ODOYO</text>

  <!-- Divider line with gradient -->
  <line x1="120" y1="88" x2="720" y2="88" stroke="url(#accent)" stroke-width="0.8" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="420" y="112" font-family="'Courier New', monospace" font-size="13" fill="#8899aa" text-anchor="middle" letter-spacing="3">INTERACTIONS &amp; DESIGN ENGINEER  ·  FULL-STACK DEVELOPER  ·  NAIROBI, KE</text>

  <!-- Tagline -->
  <text x="420" y="138" font-family="'Courier New', monospace" font-size="11" fill="#00d4ff" text-anchor="middle" opacity="0.7" letter-spacing="1">// from communications to code — building what humans love to use</text>

  <!-- Animated dots bottom right -->
  <circle cx="810" cy="148" r="2.5" fill="#00d4ff">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="148" r="2.5" fill="#7b61ff">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="148" r="2.5" fill="#00d4ff">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
</svg>
